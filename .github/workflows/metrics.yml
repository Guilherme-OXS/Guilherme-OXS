name: Gerador de Métricas Analíticas Avançadas

on:
  schedule:
    # Executa diariamente ao meio-dia
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Compilação de Métricas Vectoriais (SVG)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output_action: commit
          # Envia a imagem para a branch 'output' para não poluir o histórico principal
          committer_branch: output
          filename: github-metrics.svg
          
          # Plugins Baseados em Engenharia de Dados
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          
          # Plugin de Linguagens: Identifica estatisticamente sua vivência com Java, C, etc.
          plugin_languages: yes
          plugin_languages_ignored: html, css, jupyter notebook, tex
          plugin_languages_details: percentage
          
          # Plugin de Calendário Isométrico Secundário
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
