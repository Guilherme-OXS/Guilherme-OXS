name: Gerador de Métricas Analíticas Avançadas

on:
  # Executa automaticamente de hora em hora
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Compilação de Métricas (Lowlighter)
        uses: lowlighter/metrics@latest
        with:
          # Autenticação usando o cofre que acabamos de criar
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Seus dados
          user: Guilherme-OXS
          template: classic
          
          # Destino do arquivo (evita poluir a branch principal)
          output_action: commit
          committer_branch: output
          filename: github-metrics.svg
          
          # Configurações de exibição
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          
          # Plugins de Atividade
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: public
