name: Generate Snake Animation

on:
  # Executa a meia-noite todos os dias, atualizando as contribuições corporativas e acadêmicas
  schedule:
    - cron: "0 0 * * *"

  # Permite o acionamento manual
  workflow_dispatch:

  # Executa imediatamente ao receber novos commits na branch principal
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ED8B00
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ED8B00

      - name: Publish files
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
